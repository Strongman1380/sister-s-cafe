<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="View the full menu at Sisters Cafe in Geneva, NE." />
  <meta name="keywords" content="Sisters Cafe menu, Geneva NE food, homemade dishes" />
  <title>Sisters Cafe - Menu</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a class="navbar-brand" href="index.html"><img src="images/Sisters-logo.jpeg" alt="Sisters Cafe Logo" class="logo" /></a>
      
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- Dynamic Menu Container -->
  <div class="container">
    <h2>Our Menu</h2>
    <div id="menu-container"></div> <!-- Script will render menu here -->

    <!-- Cart Summary -->
    <section class="menu-section">
      <h3>Your Order</h3>
      <ul id="cart-items"></ul>
      <p><strong>Items:</strong> <span id="cart-count">0</span></p>
      <p><strong>Subtotal:</strong> $<span id="cart-subtotal">0.00</span></p>
      <p><strong>Tax (7.5%):</strong> $<span id="cart-tax">0.00</span></p>
      <p><strong>Total:</strong> $<span id="cart-total">0.00</span></p>
      <button id="checkout-btn" class="btn">Checkout</button>
    </section>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2025 Sisters Cafe | 
      <a href="https://www.facebook.com/profile.php?id=61573728355131" target="_blank">
        <img src="images/Facebooklogo.jpeg" alt="Facebook" style="height: 20px; vertical-align: middle;" />
      </a>
    </p>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.emailjs.com/dist/email.min.js"></script>
  <script>
    emailjs.init("GrZesY7oeZxe3C2TS");
  </script>
  <script src="script.js"></script>
</body>
</html>
