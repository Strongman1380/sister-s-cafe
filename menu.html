<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="View the full menu at Sisters Cafe in Geneva, NE. From appetizers to drinks, explore our homemade dishes." />
  <meta name="keywords" content="Sisters Cafe menu, Geneva NE food, homemade dishes, appetizers, sandwiches, drinks" />
  <title>Sisters Cafe - Menu</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto&display=swap" rel="stylesheet" />
  <script src="https://app.aminos.ai/js/chat_plugin.js" data-bot-id="48060"></script>
</head>
<body>
  <nav class="navbar sticky">
    <div class="container">
      <a class="navbar-brand" href="https://strongman1380.github.io/www.sisterscafe.com/index.html">
        <img src="https://strongman1380.github.io/www.sisterscafe.com/images/sisters-logo.jpeg" alt="Sisters Logo" class="logo" />
      </a>
      <ul class="nav-links">
        <li><a href="https://strongman1380.github.io/www.sisterscafe.com/index.html">Home</a></li>
        <li><a href="https://strongman1380.github.io/www.sisterscafe.com/menu.html">Menu</a></li>
        <li><a href="https://strongman1380.github.io/www.sisterscafe.com/about.html">About Us</a></li>
        <li><a href="https://strongman1380.github.io/www.sisterscafe.com/contact.html">Contact</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <h2>Our Menu</h2>
    <input type="text" id="menu-search" placeholder="Search menu items..." />
    <div id="menu-container">
      <!-- Menu items will be populated by script.js -->
    </div>

    <section class="menu-section">
      <h3>Your Order</h3>
      <ul id="cart-items"></ul>
      <p><strong>Items:</strong> <span id="cart-count">0</span></p>
      <p><strong>Subtotal:</strong> $<span id="cart-subtotal">0.00</span></p>
      <p><strong>Tax (7.5%):</strong> $<span id="cart-tax">0.00</span></p>
      <p><strong>Total:</strong> $<span id="cart-total">0.00</span></p>
      <button id="checkout-btn" class="btn">Checkout</button>
    </section>
  </div>

  <footer class="footer">
    <p>© 2025 Sisters Cafe | <a href="https://www.facebook.com/profile.php?id=61573728355131" target="_blank"><img src="https://strongman1380.github.io/www.sisterscafe.com/images/Facebooklogo.jpeg" alt="Facebook Logo" style="height: 20px; vertical-align: middle;"></a></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
